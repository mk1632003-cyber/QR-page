name: Cypress Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Cypress
        run: bunx cypress install

      - name: Run Dev Server & Cypress Tests
        run: |
          bunx start-server-and-test \
            "bun run dev" \
            http://localhost:3000 \
            "bunx cypress run"
