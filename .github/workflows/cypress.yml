# Generate an empty lockfile to satisfy the action's validation check
      - name: Create dummy npm lockfile
        run: echo '{}' > package-lock.json

      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          # Prevent the action from running its own npm install
          install: false
          start: bun run dev
          wait-on: 'http://localhost:3000'
