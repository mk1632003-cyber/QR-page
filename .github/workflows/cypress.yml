name: Cypress Tests
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1. Install Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. Install your project dependencies
      - name: Install dependencies
        run: bun install

      # 3. Download the actual Cypress test runner binary (using bunx)
      - name: Install Cypress Binary
        run: bunx cypress install

      # 4. Run the dev server and your tests
      - name: Run Dev Server & Cypress
        run: |
          bunx start-server-and-test 'bun run dev' http://localhost:3000 'bunx cypress run --record --key ${{ secrets.CYPRESS_RECORD_KEY }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # FIX: This forces Cypress's internal Node engine to look inside your local node_modules folder
          NODE_PATH: node_modules
