name: Cypress Tests
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1. Install Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. Install dependencies forcing a traditional Node-compatible structure
      - name: Install dependencies
        run: bun install --backend=copyfile

      # 3. Explicitly install the Cypress system binaries inside the Linux runner
      - name: Install Cypress Binary
        run: bunx cypress install

      # 4. Spin up the server and run the tests directly via Bun
      - name: Run Dev Server & Cypress
        run: |
          bunx start-server-and-test 'bun run dev' http://localhost:3000 'bunx cypress run --record --key ${{ secrets.CYPRESS_RECORD_KEY }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
