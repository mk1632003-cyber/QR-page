name: Cypress Tests
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1. Setup Bun environment
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. Install your project dependencies using Bun
      - name: Install dependencies
        run: bun install

      # 3. Download the core Cypress runner binaries 
      - name: Install Cypress Binary
        run: bunx cypress install

      # 4. Spin up your server on port 3000 and run the tests
      - name: Run Dev Server & Cypress Tests
        run: |
          bunx start-server-and-test 'bun run dev' http://localhost:3000 'bunx cypress run'
