name: Cypress Tests
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false 
      matrix:
        containers: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1. Install Bun on the GitHub runner
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. Run Cypress using Bun
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          # Overrides the lockfile check and forces it to use bun install
          install-command: bun install
          start: bun run dev 
          wait-on: 'http://localhost:5173' 
          record: true
          parallel: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
