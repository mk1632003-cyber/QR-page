name: Cypress Tests
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false 
      matrix:
        containers: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1. Install Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. Trick Cypress by generating an empty lockfile it expects
      - name: Create empty npm lockfile for Cypress
        run: echo '{}' > package-lock.json

      # 3. Run Cypress using Bun
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          # Now it passes the validation check and runs our custom Bun install!
          install-command: bun install
          start: bun run dev 
          wait-on: 'http://localhost:5173' 
          record: true
          parallel: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
