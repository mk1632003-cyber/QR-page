name: Cypress Tests
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false 
      matrix:
        containers: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1. Install Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. Trick Cypress Action validation
      - name: Create empty npm lockfile for Cypress
        run: echo '{}' > package-lock.json

      # 3. Explicitly install dependencies via Bun outside of the Cypress action
      - name: Install dependencies
        run: bun install

      # 4. Run Cypress 
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          # Tell the action NOT to run an installation script itself
          install: false
          start: bun run dev 
          wait-on: 'http://localhost:3000' 
          record: true
          parallel: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
